<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mi Vida 💛</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(180deg,#0f172a,#111827,#1e293b);
display:flex;
justify-content:center;
align-items:center;
position:relative;
color:white;
}

/* Fondo */

.stars{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
z-index:1;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%,100%{
opacity:0.2;
}
50%{
opacity:1;
}
}

/* Texto inicial */

.intro{
position:absolute;
z-index:10;
text-align:center;
animation:fadeText 4s forwards;
}

.intro h1{
font-size:5rem;
color:#ffd54f;
text-shadow:0 0 30px rgba(255,213,79,0.9);
}

@keyframes fadeText{
0%{
opacity:0;
transform:scale(0.5);
}

20%{
opacity:1;
transform:scale(1);
}

80%{
opacity:1;
transform:scale(1);
}

100%{
opacity:0;
transform:scale(1.3);
visibility:hidden;
}
}

/* Escena principal */

.main{
position:absolute;
z-index:15;
opacity:0;
display:flex;
flex-direction:column;
align-items:center;
animation:showMain 3s forwards;
animation-delay:4s;
}

@keyframes showMain{
to{
opacity:1;
}
}

/* Ramo gigante */

.bouquet{
font-size:9rem;
animation:float 4s ease-in-out infinite;
filter:drop-shadow(0 0 25px rgba(255,213,79,0.6));
}

@keyframes float{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-15px);
}
}

/* Mensaje */

.message{
margin-top:20px;
font-size:1.5rem;
text-align:center;
padding:0 20px;
line-height:2.2rem;
color:#f8fafc;
text-shadow:0 0 10px rgba(255,255,255,0.2);
}

/* Flores pequeñas */

.flower{
position:absolute;
font-size:25px;
animation:fall linear infinite;
z-index:5;
opacity:0.9;
}

@keyframes fall{
0%{
transform:translateY(-100px) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(360deg);
}
}

/* Partículas */

.sparkle{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
animation:sparkle 2s infinite;
z-index:2;
}

@keyframes sparkle{
0%,100%{
opacity:0;
transform:scale(0.5);
}
50%{
opacity:1;
transform:scale(1.5);
}
}

/* Música */

.music{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
z-index:20;
opacity:0.9;
}

iframe{
border-radius:20px;
width:320px;
height:80px;
border:none;
}

/* Responsive */

@media(max-width:600px){

.intro h1{
font-size:3.5rem;
}

.bouquet{
font-size:6rem;
}

.message{
font-size:1.1rem;
line-height:1.8rem;
}

iframe{
width:280px;
}

}

</style>
</head>

<body>

<!-- Fondo estrellas -->

<div class="stars"></div>

<!-- Texto inicial -->

<div class="intro">
<h1>Mi Vida 💛</h1>
</div>

<!-- Escena principal -->

<div class="main">

<div class="bouquet">
💐🌻💛🌻💐
</div>

<div class="message">
Para la persona más bonita de mi mundo ✨<br>
Cada día contigo se siente más especial 🌻💛
</div>

</div>

<!-- Música -->

<div class="music">

<iframe 
src="https://open.spotify.com/embed/track/0nvSzd2KP9t01PTBBtPXLr?utm_source=generator"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>

</div>

<script>

/* Estrellas */

for(let i=0;i<120;i++){

let star=document.createElement('div');

star.classList.add('star');

star.style.left=Math.random()*100+'vw';
star.style.top=Math.random()*100+'vh';

star.style.animationDuration=
(2+Math.random()*4)+'s';

document.querySelector('.stars').appendChild(star);

}

/* Flores pequeñas cayendo */

for(let i=0;i<40;i++){

let flower=document.createElement('div');

flower.classList.add('flower');

flower.innerHTML='🌻';

flower.style.left=Math.random()*100+'vw';

flower.style.animationDuration=
(5+Math.random()*10)+'s';

flower.style.fontSize=
(18+Math.random()*30)+'px';

document.body.appendChild(flower);

}

/* Brillos */

for(let i=0;i<50;i++){

let sparkle=document.createElement('div');

sparkle.classList.add('sparkle');

sparkle.style.left=Math.random()*100+'vw';
sparkle.style.top=Math.random()*100+'vh';

sparkle.style.animationDuration=
(1+Math.random()*3)+'s';

document.body.appendChild(sparkle);

}

</script>

</body>
</html>
